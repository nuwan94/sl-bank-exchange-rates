<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>USD Rates</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial; padding: 1rem; }
      table { border-collapse: collapse; width: 100%; max-width: 900px; }
      th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; }
      th { background: #f7f7f7; }
      pre { background:#f5f5f5; padding:12px; overflow:auto }
    </style>
  </head>
  <body>
    <h1>USD Rates</h1>
    <div id="app">Loading…</div>

    <script type="module">
      import { h, render } from 'https://unpkg.com/preact@10.11.0?module';
      import htm from 'https://unpkg.com/htm@3.1.1?module';
      const html = htm.bind(h);

      function App() {
        const root = document.createElement('div');

        async function load() {
          try {
            const res = await fetch('./data/rates.json', { cache: 'no-store' });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();

            const parsed = data.parsed || {};
            const fetched = data.fetched_at || 'unknown';

            render(html`
              <div>
                <p><strong>Fetched:</strong> ${fetched}</p>
                <table>
                  <thead>
                    <tr><th>Source</th><th>USD Rate (parsed)</th></tr>
                  </thead>
                  <tbody>
                    <tr><td>Sampath</td><td>${parsed.sampath ?? '—'}</td></tr>
                    <tr><td>HNB</td><td>${parsed.hnb ?? '—'}</td></tr>
                  </tbody>
                </table>
                <h3>Raw JSON</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
              </div>
            `, root);
          } catch (err) {
            render(html`<div style="color:crimson">Error loading data: ${err.message}</div>`, root);
          }
        }

        load();
        return root;
      }

      const app = App();
      document.getElementById('app').replaceWith(app);
    </script>
  </body>
</html>
