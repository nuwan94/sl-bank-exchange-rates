name: Bank Currency Rate Monitor

on:
  # ── Run every 30 minutes ─────────────────────────────────────────────────
  schedule:
    - cron: "0,30 * * * *"   # every 30 min — change to "*/15 * * * *" for every 15 min

  # ── Also allow manual trigger from GitHub Actions UI ────────────────────
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-sampath:
    name: Fetch Sampath Rate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # no pip cache needed for this small script

      - name: Fetch Sampath rate
        run: python fetch_sampath.py

      - name: Upload Sampath artifact
        uses: actions/upload-artifact@v4
        with:
          name: sampath-rate
          path: output/sampath.json

  fetch-hnb:
    name: Fetch HNB Rate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # no pip cache needed for this small script

      - name: Fetch HNB rate
        run: python fetch_hnb.py

      - name: Upload HNB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hnb-rate
          path: output/hnb.json

  # Notifications have been removed; notification logic was previously handled by the
  # `notify` job which ran `notify.py`. That job is intentionally omitted in the
  # new workflow format to keep Actions focused on fetching and committing data.

  commit-data:
    name: Update rates.json and commit
    runs-on: ubuntu-latest
    needs:
      - fetch-sampath
      - fetch-hnb
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script to build rates
        run: python update_rates.py

      - name: Commit and push rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q web/data/rates.json; then
            git add .
            git commit -m "Update rates [skip ci]"
            git push origin HEAD
          else
            echo "No changes to rates"
          fi
