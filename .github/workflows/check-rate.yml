name: Bank Currency Rate Monitor

on:
  # ── Run every 30 minutes ─────────────────────────────────────────────────
  schedule:
    - cron: "0,30 * * * *"   # every 30 min — change to "*/15 * * * *" for every 15 min

  # ── Also allow manual trigger from GitHub Actions UI ────────────────────
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    name: Update rates and history
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script to build rates
        run: python update_rates.py

      - name: Commit and push rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[CRON] Update rates $(date -u +"%d-%m-%Y %H:%M")" 
          git push origin HEAD
