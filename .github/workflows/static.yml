# Simple workflow for building the React app and deploying it to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          check-latest: true

      - name: Ensure pnpm available
        run: |
          set -eux
          if command -v pnpm >/dev/null 2>&1; then
            echo "pnpm already installed: $(pnpm --version)"
          else
            if command -v corepack >/dev/null 2>&1; then
              corepack enable || true
              corepack prepare pnpm@latest --activate || true
            fi
            if ! command -v pnpm >/dev/null 2>&1; then
              echo "corepack did not provide pnpm; installing via npm"
              npm install -g pnpm@latest
            fi
            pnpm --version
          fi

      - name: Verify tooling
        run: |
          node --version
          which pnpm || true
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Verify pnpm in PATH
        run: |
          echo "pnpm -> $(command -v pnpm || true)"
          pnpm -v
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      # Runtime data is now placed into `web/public/data` so Vite will include it in the build.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
