# Simple workflow for building the React app and deploying it to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_run:
    workflows: ["Bank Currency Rate Monitor"]
    types:
      - completed
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          check-latest: true

      - name: Ensure pnpm available
        run: |
          set -eux
          npm install -g pnpm

      - name: Verify tooling
        run: |
          node --version
          which pnpm || true
          pnpm --version

      - name: Install dependencies
        run: pnpm install
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Show build output (diagnostics)
        run: |
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"
          echo "ls web (top-level):"
          ls -la web || true
          echo "ls web/dist:"
          ls -la web/dist || true
          echo "ls web/build:"
          ls -la web/build || true
          echo "Disk usage for web:"
          du -sh web || true

      - name: Detect pages artifact
        id: detect
        run: |
          if [ -d web/dist ] && [ "$(ls -A web/dist || true)" ]; then
            echo "Detected: web/dist"
            echo "path=web/dist" >> $GITHUB_OUTPUT
          elif [ -d web/build ] && [ "$(ls -A web/build || true)" ]; then
            echo "Detected: web/build"
            echo "path=web/build" >> $GITHUB_OUTPUT
          else
            echo "No build output found in web/dist or web/build" >&2
            ls -la web || true
            exit 1
          fi

      - name: Show artifact contents before upload
        run: |
          echo "Uploading contents of ${{ steps.detect.outputs.path }}:"
          find "${{ steps.detect.outputs.path }}" -maxdepth 3 -type f -print | sed -n '1,200p'
          du -sh "${{ steps.detect.outputs.path }}" || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Show deployment outputs
        if: ${{ always() }}
        run: |
          echo "deployment outputs:"
          echo "page_url: ${{ steps.deployment.outputs.page_url || 'N/A' }}"
          echo "deployment_id: ${{ steps.deployment.outputs.deployment_id || 'N/A' }}"